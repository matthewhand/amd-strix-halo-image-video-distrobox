# Docker Compose v2 for AMD Strix Halo Image & Video Toolbox
#
# Profiles:
#   qwen-image   → Qwen Image Studio server on :8180 (for external /api/generate etc.)
#   qwen-tts     → Qwen3-TTS server on :8010 (HSA_OVERRIDE_GFX_VERSION=11.0.0)
#   heartmula    → HeartMuLa music worker on :8011 (POST /music, /health)
#   comfyui      → ComfyUI server on :8188 (API for video/ltx/wan flows)
#   slopfinity   → Slopfinity dashboard on :9099 (see override)
#   slop         → umbrella for the full stack (qwen-image + qwen-tts + heartmula + comfyui) — HTTP workers for slopfinity (use URLs instead of scripts)
#
# Full stack:      docker compose --profile slop up -d
# Image-only:      docker compose --profile qwen-image up -d
# ComfyUI-only:    docker compose --profile comfyui up -d
#
# Override ports and paths via .env (see .env.example).

# x- extension so plain `docker compose config` output includes the phrase for plan step 1 inspection
x-slopfinity-http-workers: "HTTP workers for slopfinity (Qwen Image Studio on 8180, Qwen3-TTS on 8010, HeartMuLa on 8011, ComfyUI on 8188) — use URLs instead of scripts for slopfinity wiring"

services:
  strix-halo-toolbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: amd-strix-halo-image-video-toolbox:latest
    container_name: strix-halo-toolbox
    restart: unless-stopped

    # Toolbox is a pure shell / build anchor. No profile means it starts under
    # `docker compose up`. The real servers live in the dedicated service
    # profiles below — use `docker exec -it strix-halo-toolbox bash` for a
    # ROCm REPL.

    # Run as host user so mounted files have correct ownership
    user: "${UID:-1000}:${GID:-1000}"

    # GPU and system access
    network_mode: host
    privileged: true
    environment:
      # Set HOME for non-root user (mount targets use this path)
      - HOME=/home/user
      # USER must be set so torch._dynamo's cache_dir() can call getpass.getuser()
      - USER=user

      # ROCm / Triton / Flash-Attention environment (CRITICAL for gfx1151)
      # 11.5.1 is required for Strix Halo GPU operations.
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      - FLASH_ATTENTION_TRITON_AMD_ENABLE=false
      - QWEN_FA_SHIM=1
      - WAN_ATTENTION_BACKEND=sdpa
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:1024,garbage_collection_threshold:0.8
      - HIP_VISIBLE_DEVICES=0
      - ROC_ENABLE_PRE_VEGA=1

      # torchaudio linker fix
      - LD_LIBRARY_PATH=/opt/venv/lib/python3.13/site-packages/_rocm_sdk_core/lib:/opt/venv/lib/python3.13/site-packages/torch/lib:${LD_LIBRARY_PATH:-}

      # Explicitly point to CLI wrapper
      - QIM_CLI_PATH=/opt/qwen-image-studio/qwen-image-mps.py

      # Fast model downloads
      - HF_HUB_ENABLE_HF_TRANSFER=1

      # Service Configuration (set to 0 to disable in start_docker.sh)
      # - QWEN_PORT=8180
      # - COMFYUI_PORT=8188

    volumes:
      # GPU device access
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd

      # Persist models and outputs (override paths in .env)
      - ${HF_CACHE:-./huggingface-cache}:/home/user/.cache/huggingface
      - ${QWEN_OUTPUTS:-./qwen-outputs}:/home/user/.qwen-image-studio
      - ${WAN_MODELS:-./wan-models}:/home/user/wan-models
      - ${COMFY_MODELS:-./comfy-models}:/opt/ComfyUI/models
      - ${COMFY_INPUT:-./comfy-input}:/opt/ComfyUI/input
      - ${COMFY_OUTPUTS:-./comfy-outputs}:/opt/ComfyUI/output
      - ./scripts/start_docker.sh:/opt/start_docker.sh:ro

    security_opt:
      - seccomp:unconfined

    working_dir: /workspace

    # Toolbox is now a pure shell. Real servers live in qwen-image-service
    # and comfyui-service (see below). Keeping /opt/start_docker.sh mounted
    # for manual invocation if someone needs the legacy all-in-one behavior.
    command: ["tail", "-f", "/dev/null"]

  # Qwen-Image-only service profile. Separate from qwen-tts (P4, port 8010)
  # so the profile name reflects modality. Mutually exclusive with a toolbox
  # running start_docker.sh on :8180 — pre-flight guard below exits cleanly
  # if the port is already bound.
  qwen-image-service:
    extends: strix-halo-toolbox
    container_name: strix-halo-qwen-image
    profiles:
      - qwen-image
      - slop
    # ROOT required: torch+ROCm GPU enumeration fails for non-root uid on gfx1151
    user: "0:0"
    command: >
      bash -c "
        if (echo > /dev/tcp/127.0.0.1/8180) 2>/dev/null ; then
          echo 'ERROR: Port 8180 is already bound (likely a toolbox running start_docker.sh).' 1>&2
          echo '       Stop the other Qwen server first, or change QWEN_PORT.' 1>&2
          sleep 30
          exit 0
        fi
        echo '🎨 Starting Qwen Image Studio...'
        if [ -f /opt/qwen_launcher.py ] && [ -f /opt/qwen-image-studio/qwen-image-studio/server.py ]; then
          cp /opt/qwen_launcher.py /opt/qwen-image-studio/qwen-image-mps.py
        fi
        cd /opt/qwen-image-studio/qwen-image-studio
        exec uvicorn server:app --host 0.0.0.0 --port 8180
      "

  # Qwen3-TTS service profile on :8010. Separate from qwen-image (:8000) so
  # you can run TTS independently. Enforces HSA_OVERRIDE_GFX_VERSION=11.0.0
  # (NOT the 11.5.1 used by the rest of the stack — the TTS model's kernels
  # regress under 11.5.1 on gfx1151).
  qwen-tts-service:
    extends: strix-halo-toolbox
    container_name: strix-halo-qwen-tts
    profiles:
      - qwen-tts
      - slop
    # ROOT required: torch+ROCm GPU enumeration fails for non-root uid on
    # gfx1151 (same as qwen-image / heartmula / comfyui). Without this,
    # qwen-tts sees `cuda False` / triton "0 active drivers".
    user: "0:0"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      # Redirect HuggingFace cache to a writable bind-mounted path. The default
      # /home/user/.cache/huggingface is read-only for the container UID once
      # the model tries to materialize the CustomVoice subdir, causing every
      # /tts call to crash with PermissionError. /workspace is the slopfinity
      # bind mount of ./comfy-outputs/experiments on the host.
      # Prefer roomy downloads mount for HF cache when available; fall back
      # to workspace (experiments) so TTS still works offline-disk layouts.
      - HF_HOME=${QWEN_TTS_HF_HOME:-/mnt/downloads/cache/huggingface-tts}
      - QWEN_TTS_MIN_FREE_GB=${QWEN_TTS_MIN_FREE_GB:-8}
      # hf_transfer often missing in toolbox image; classic download is fine.
      - HF_HUB_ENABLE_HF_TRANSFER=0
      # DramaBox (ResembleAI) — engine=dramabox on POST /tts
      - DRAMABOX_ROOT=/opt/DramaBox
      - DRAMABOX_VOICES=/opt/dramabox_voices
      - DRAMABOX_HF_HOME=/mnt/downloads/dramabox-hf
      - DRAMABOX_TIMEOUT_S=${DRAMABOX_TIMEOUT_S:-1800}
      - DRAMABOX_BNB_4BIT=0
      # USER + LOGNAME — Qwen3-TTS's CustomVoice loader calls
      # `getpass.getuser()` to derive a sanitized voice-bank dirname.
      # In containers without /etc/passwd entries for the runtime UID
      # (or with USER/LOGNAME unset), getpass raises
      # `OSError: No username set in the environment`, returning HTTP
      # 500 on every /tts request. Setting either env var resolves
      # without needing to rebuild the image. "slopfinity" is just a
      # stable identifier — the dirname becomes
      # .../slopfinity_<voice>/.
      - USER=slopfinity
      - LOGNAME=slopfinity
      - PYTHONPATH=/opt
      # Writable home for aiter/triton JIT caches (image /home/user is often RO).
      - HOME=/workspace
    volumes:
      - ./comfy-outputs/experiments:/workspace
      # Roomy HF cache for Qwen3 weights (root is often 97% full).
      - /mnt/downloads/cache/huggingface-tts:/mnt/downloads/cache/huggingface-tts
      # Host launchers so disk-guard / gfx fixes apply without image rebuild.
      - ./scripts/qwen_tts_launcher.py:/opt/qwen_tts_launcher.py:ro
      - ./scripts/qwen_tts_serve.py:/opt/qwen_tts_serve.py:ro
      - ./scripts/kokoro_tts_launcher.py:/opt/kokoro_tts_launcher.py:ro
      - ./scripts/dramabox_launcher.py:/opt/dramabox_launcher.py:ro
      - ./scripts/dramabox_voices:/opt/dramabox_voices:ro
      - ./scripts/http_worker_app.py:/opt/http_worker_app.py:ro
      # DramaBox checkout + HF weights (DiT + audio components + gemma).
      - /mnt/downloads/dramabox-work/DramaBox:/opt/DramaBox:ro
      - /mnt/downloads/dramabox-hf:/mnt/downloads/dramabox-hf:ro
    command:
      - bash
      - -lc
      - |
        if (echo > /dev/tcp/127.0.0.1/8010) 2>/dev/null ; then
          echo 'ERROR: Port 8010 is already bound.' 1>&2
          echo '       Stop the other TTS worker first, or change TTS_PORT.' 1>&2
          sleep 30
          exit 0
        fi
        # /workspace/tts is served by the dashboard at /files/tts/<name>.
        mkdir -p /workspace/tts /mnt/downloads/cache/huggingface-tts
        chown -R "$$(id -u):$$(id -g)" /workspace/tts 2>/dev/null || true
        echo '📦 Installing kokoro-onnx (default engine)...'
        pip install --quiet kokoro-onnx || echo 'WARN: kokoro install failed; only qwen path will work'
        echo '📦 Ensuring qwen-tts engine...'
        if ! python3 -c 'from qwen_tts import Qwen3TTSModel' 2>/dev/null; then
          pip install --quiet --no-deps qwen-tts \
            || echo 'WARN: qwen-tts --no-deps failed'
          if ! python3 -c 'from qwen_tts import Qwen3TTSModel' 2>/dev/null; then
            pip install --quiet 'qwen-tts' 'transformers>=4.57,<5' \
              || echo 'WARN: qwen-tts install failed; only kokoro path will work'
          fi
        fi
        # DramaBox deps (light extras; torch is already ROCm-pinned).
        echo '📦 Ensuring DramaBox extras (peft/safetensors/einops)...'
        pip install --quiet 'peft>=0.7' 'safetensors>=0.4' 'einops>=0.7' 'soundfile>=0.12' \
          || echo 'WARN: dramabox extras install failed'
        export TTS_OUT_DIR=/workspace/tts
        echo "🎙️  Starting TTS worker on :8010 (default engine: kokoro, HF_HOME=$$HF_HOME)..."
        exec python3 /opt/qwen_tts_serve.py

  # HeartMuLa music worker on :8011 (scripts/heartmula_serve.py).
  # Included in 'slop' profile (alongside qwen-tts, qwen-image, comfyui) so
  # `docker compose --profile slop up -d` starts the network-accessible
  # HTTP worker by default. The thin serve shells the launcher per request
  # (same cost profile as legacy docker-run path). Wire via HEARTMULA_URL=http://localhost:8011/music
  # (or override port) from slopfinity etc.
  heartmula-service:
    extends: strix-halo-toolbox
    container_name: strix-halo-heartmula
    profiles:
      - heartmula
      - slop
    # ROOT required (like qwen-image-service and comfyui-service) for torch+ROCm GPU init on gfx1151.
    user: "0:0"
    working_dir: /opt
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      - HEARTMULA_OUT_DIR=/workspace/music
      - HEARTMULA_PORT=${HEARTMULA_PORT:-8011}
      - HEARTMULA_MODEL_ROOT=/mnt/downloads/comfy-models/HeartMuLa
      - PYTHONPATH=/opt
    volumes:
      - ./comfy-outputs/experiments:/workspace
      # Bind-mount serve scripts so older toolbox images without COPY'd
      # heartmula_serve / http_worker_app still boot (ModuleNotFoundError).
      # Image rebuild with Dockerfile COPY remains the long-term source of truth.
      - ./scripts/heartmula_serve.py:/opt/heartmula_serve.py:ro
      - ./scripts/heartmula_launcher.py:/opt/heartmula_launcher.py:ro
      - ./scripts/http_worker_app.py:/opt/http_worker_app.py:ro
      # Model mount overridable via HEARTMULA_MODELS_HOST (host path) in .env
      - ${HEARTMULA_MODELS_HOST:-/mnt/downloads/comfy-models}:/mnt/downloads/comfy-models:ro
    command: >
      bash -c "
        if (echo > /dev/tcp/127.0.0.1/${HEARTMULA_PORT:-8011}) 2>/dev/null ; then
          echo \"ERROR: Port ${HEARTMULA_PORT:-8011} is already bound.\" 1>&2
          echo '       Stop the other HeartMuLa worker first, or change HEARTMULA_PORT.' 1>&2
          sleep 30
          exit 0
        fi
        # /workspace/music is served by the dashboard at /files/music/<name>;
        # run_fleet resolves the worker's returned URL back to this dir.
        mkdir -p /workspace/music && chown -R $(id -u):$(id -g) /workspace/music 2>/dev/null || true
        echo \"🎼 Starting HeartMuLa music worker on :${HEARTMULA_PORT:-8011} (out=/workspace/music)...\"
        exec python3 /opt/heartmula_serve.py
      "

  # ComfyUI-only service profile. Mutually exclusive with a toolbox running
  # start_docker.sh on :8188.
  comfyui-service:
    extends: strix-halo-toolbox
    container_name: strix-halo-comfyui
    profiles:
      - comfyui
      - slop
    # ROOT user is required for torch+ROCm to enumerate the GPU. Even with
    # /dev/kfd mode 666 + privileged + render-group membership, AMDGPU's
    # init blocks non-root processes (`torch.cuda.is_available() → False` as
    # uid 1000, True as uid 0). The toolbox container can run unprivileged
    # because qwen-image-mps does its own GPU init dance, but ComfyUI hits
    # the device-enumeration path at module-import time.
    user: "0:0"
    # `USER` must be set so torch._dynamo's cache_dir() can call getpass.getuser()
    # without raising — was crash-looping on `OSError: No username set`.
    environment:
      - USER=root
      - PYTHONUNBUFFERED=1
    # Append mounts (compose merges with extends parent volumes).
    volumes:
      - ./scripts/patch_ltxvideo_kornia.py:/opt/patch_ltxvideo_kornia.py:ro
      - ./scripts/start_comfyui_service.sh:/opt/start_comfyui_service.sh:ro
    command: ["bash", "/opt/start_comfyui_service.sh"]
