# Docker Compose v2 for AMD Strix Halo Image & Video Toolbox
services:
  strix-halo-toolbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: amd-strix-halo-image-video-toolbox:latest
    container_name: strix-halo-toolbox
    restart: unless-stopped

    # Auto-start services
    profiles:
      - qwen
      - comfyui

    # Run as host user so mounted files have correct ownership
    user: "${UID:-1000}:${GID:-1000}"

    # GPU and system access
    network_mode: host
    privileged: true
    environment:
      # Set HOME for non-root user (mount targets use this path)
      - HOME=/home/user

      # WAN uses SDPA by default in Docker (more stable than Triton for long runs)
      - WAN_ATTENTION_BACKEND=sdpa

      # Fast model downloads
      - HF_HUB_ENABLE_HF_TRANSFER=1

      # Service Configuration (set to 0 to disable)
      # - QWEN_PORT=8000
      # - COMFYUI_PORT=8188

    volumes:
      # GPU device access
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd

      # Persist models and outputs (override paths in .env)
      - ${HF_CACHE:-./huggingface-cache}:/home/user/.cache/huggingface
      - ${QWEN_OUTPUTS:-./qwen-outputs}:/home/user/.qwen-image-studio
      - ${WAN_MODELS:-./wan-models}:/home/user/wan-models
      - ${COMFY_MODELS:-./comfy-models}:/opt/ComfyUI/models
      - ${COMFY_OUTPUTS:-./comfy-outputs}:/opt/ComfyUI/output

    security_opt:
      - seccomp:unconfined

    working_dir: /workspace

    # Default command for full services mode
    command: /opt/start_docker.sh

  # Qwen-only service profile
  qwen-service:
    extends: strix-halo-toolbox
    container_name: strix-halo-qwen
    profiles:
      - qwen-only
    command: >
      bash -c "
        echo '🎨 Starting Qwen Image Studio only...'
        cd /opt/qwen-image-studio
        python3 qwen-image-mps.py serve --host 0.0.0.0 --port 8000
      "

  # ComfyUI-only service profile
  comfyui-service:
    extends: strix-halo-toolbox
    container_name: strix-halo-comfyui
    profiles:
      - comfyui-only
    command: >
      bash -c "
        echo '🖼️  Starting ComfyUI only (FP16 Mode)...'
        cd /opt/ComfyUI
        python3 main.py --listen 0.0.0.0 --port 8188 --output-directory /opt/ComfyUI/output --force-fp16
      "