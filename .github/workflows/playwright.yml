name: Playwright Tests

# Two-lane CI per the failure-packet pattern:
#   * Concise dot reporter to terminal
#   * Structured JSON + JUnit to artifacts/ (always uploaded)
#   * Markdown failure-packet (always uploaded)
#   * Heavy debug artifacts (HTML report, traces, videos, screenshots)
#     uploaded only on failure
#
# Reads-in-order for any agent triaging a failure:
#   1. failure-packet.md (compact, ≤20 failures, error first lines)
#   2. failed-tests.json (structured per-test data)
#   3. playwright-report/ (only when packet is insufficient)

on:
  push:
    branches: [main]
    paths:
      - 'slopfinity/static/**'
      - 'slopfinity/templates/**'
      - 'slopfinity/server.py'
      - 'e2e/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/playwright.yml'
      - 'scripts/extract-failures.mjs'
  pull_request:
    paths:
      - 'slopfinity/static/**'
      - 'slopfinity/templates/**'
      - 'slopfinity/server.py'
      - 'e2e/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/playwright.yml'
      - 'scripts/extract-failures.mjs'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # NON-BLOCKING: the e2e suite exercises the live dashboard, parts of
    # which need a real LLM / ComfyUI backend that CI does not provide.
    # Backend-dependent specs are SKIPPED here (they import e2e/_fixtures.js,
    # which test.skip()s them unless SLOPFINITY_HAS_LLM is set — and we
    # deliberately leave it unset below). The remaining static layout /
    # chrome / contract specs are the real signal. We still mark the job
    # continue-on-error so a transient/environmental red never gates a
    # merge while the suite stabilises; the failure-packet + report
    # artifacts below are always uploaded for triage regardless.
    continue-on-error: true

    # Pin the experiments dir to a writable workspace path so it is shared
    # between the seed step and the booted dashboard. (paths.py honours
    # SLOPFINITY_EXP_DIR and otherwise falls back to ./comfy-outputs.)
    env:
      SLOPFINITY_EXP_DIR: ${{ github.workspace }}/ci-exp

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright + browsers
        run: npx playwright install --with-deps chromium

      - name: Set up Python (for the dashboard the e2e suite hits)
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Slopfinity Python deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi 'uvicorn[standard]' jinja2 python-multipart httpx psutil pyyaml

      - name: Make artifacts dir
        run: mkdir -p artifacts

      - name: Seed a placeholder output (so the Slop card renders)
        run: |
          # The Slop output card (#output-section) is server-rendered
          # display:none when the experiments dir has no images/videos —
          # an intentional empty-state. The smoke + layouts specs assert
          # the *populated* layout, so drop a tiny placeholder image +
          # FINAL clip into SLOPFINITY_EXP_DIR before boot. This needs no
          # backend — it just primes _list_outputs().
          mkdir -p "$SLOPFINITY_EXP_DIR"
          # 1x1 transparent PNG (decoded from base64).
          printf 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=' \
            | base64 -d > "$SLOPFINITY_EXP_DIR/slop_1_f1.png"
          printf '\x00\x00\x00\x18ftypmp42' > "$SLOPFINITY_EXP_DIR/FINAL_1.mp4"

      - name: Start mock LLM backend in background
        run: |
          # The backend-gated specs (e2e/_fixtures.js) drive the
          # suggestion / story / chat machinery, which talks to a local
          # OpenAI-compat LLM behind the dashboard. tests/mock_llm_server.py
          # is a stdlib-only stand-in that serves /v1/models +
          # /v1/chat/completions with canned, contract-shaped responses
          # (multi-mode suggestion dicts, STRICT-JSON distribute, etc.).
          # We bind it on 11500 (not the Ollama-default 11434) and point
          # the dashboard's LLM pool at it via SLOPFINITY_LLM_PRIMARY_URL
          # below, so /subjects/suggest et al. return deterministic data.
          (LLM_MOCK_HOST=127.0.0.1 LLM_MOCK_PORT=11500 \
            python3 tests/mock_llm_server.py >artifacts/mock-llm.log 2>&1 &)
          for i in $(seq 1 30); do
            curl -fs http://127.0.0.1:11500/v1/models >/dev/null && exit 0
            sleep 1
          done
          echo "::error::mock LLM did not respond on :11500 within 30s"
          tail -50 artifacts/mock-llm.log
          exit 1

      - name: Boot Slopfinity dashboard in background
        env:
          # Point BOTH the primary and the CPU/failover LLM slots at the
          # mock so /subjects/suggest, /enhance and chat resolve to it
          # regardless of which slot the scheduler prefers (pool.py reads
          # these; an empty model auto-picks the mock's single model id).
          SLOPFINITY_LLM_PRIMARY_URL: http://127.0.0.1:11500/v1
          SLOPFINITY_LLM_CPU_URL: http://127.0.0.1:11500/v1
        run: |
          # Bind to loopback (matches default since #142). The Playwright
          # config picks up SLOPFINITY_URL=http://localhost:9099 by
          # default, so no env override needed. SLOPFINITY_EXP_DIR (job
          # env) points the dashboard at the same seeded experiments dir.
          (python3 dark_server.py >artifacts/slopfinity.log 2>&1 &)
          # Wait until the FastAPI worker answers /healthz. Bounded by
          # 60s — if the server fails to boot, fail the workflow fast
          # rather than letting Playwright eat its 30s per-test timeouts.
          for i in $(seq 1 60); do
            curl -fs http://localhost:9099/healthz >/dev/null && exit 0
            sleep 1
          done
          echo "::error::Slopfinity did not respond on :9099 within 60s"
          tail -50 artifacts/slopfinity.log
          exit 1

      - name: Run Playwright tests
        env:
          CI: '1'
          # The mock LLM backend is up (started above) and the dashboard
          # is pointed at it, so the backend-gated specs (e2e/_fixtures.js)
          # should RUN, not self-skip. Setting SLOPFINITY_HAS_LLM=1 flips
          # the gate on so the full suite executes against the mock.
          SLOPFINITY_HAS_LLM: '1'
        run: npx playwright test

      - name: Extract failed tests + build markdown packet
        if: always()
        run: node scripts/extract-failures.mjs

      - name: Upload structured results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-structured-results
          path: |
            artifacts/results.json
            artifacts/results.xml
            artifacts/failed-tests.json
          retention-days: 14

      - name: Upload markdown failure packet (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-packet
          path: artifacts/failure-packet.md
          retention-days: 14

      - name: Build human-readable test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: 'artifacts/results.xml'
          output: artifacts/test-summary.md
        continue-on-error: true

      - name: Append summary to GitHub job summary
        if: always()
        run: |
          if [ -f artifacts/test-summary.md ]; then
            cat artifacts/test-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f artifacts/failure-packet.md ]; then
            echo '## Failure packet' >> "$GITHUB_STEP_SUMMARY"
            cat artifacts/failure-packet.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload rich failure artifacts (HTML report, traces, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            playwright-report/
            test-results/
            artifacts/slopfinity.log
            artifacts/mock-llm.log
          retention-days: 7
