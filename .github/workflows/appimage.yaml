name: AppImage build

# Builds a self-contained Slopfinity dashboard AppImage. The AppImage
# packages just the FastAPI server + the Tailwind-bundled static assets;
# at runtime the user still needs Docker + the strix-halo-comfyui /
# qwen-image / heartmula containers running on their host. The
# AppImage is the dashboard CONTROL PLANE — the heavy compute lives
# in the docker stack.
#
# Triggers:
#   - manual (workflow_dispatch)
#   - tag push (v*) — also publishes the AppImage as a release asset
#   - PR / branch push — uploads as a build artifact for QA

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'slopfinity/**'
      - 'dark_server.py'
      - 'Makefile'
      - '.github/workflows/appimage.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install OS build deps (FUSE for AppImage runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 file desktop-file-utils

      - name: Build Tailwind bundle
        run: make tailwind

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          # Slopfinity runtime dependencies. Keep this list narrow so the
          # AppImage stays small; if dark_server.py grows new imports,
          # add them here AND in the --hidden-import flags below.
          pip install \
            fastapi 'uvicorn[standard]' jinja2 python-multipart \
            httpx psutil pyyaml \
            pyinstaller

      - name: Freeze with PyInstaller
        # --onefile: single executable. --add-data ships the templates +
        # static assets + branding profiles inside the binary; PyInstaller
        # extracts them to a temp dir at startup. --hidden-import covers
        # FastAPI's lazy uvicorn-loop pickup that PyInstaller's dependency
        # tracer misses.
        run: |
          pyinstaller \
            --onefile \
            --name slopfinity-server \
            --add-data 'slopfinity/templates:slopfinity/templates' \
            --add-data 'slopfinity/static:slopfinity/static' \
            --add-data 'branding:branding' \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.loops.asyncio \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.http.h11_impl \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.protocols.websockets.websockets_impl \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import slopfinity.workers \
            dark_server.py

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/slopfinity-server AppDir/usr/bin/

          # AppRun — entrypoint the AppImage runtime invokes.
          cat > AppDir/AppRun <<'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export SLOPFINITY_BUNDLED=1
          exec "${HERE}/usr/bin/slopfinity-server" "$@"
          EOF
          chmod +x AppDir/AppRun

          # .desktop file — required by AppImage spec; surfaces in
          # desktop-environment app menus when the AppImage is registered.
          cat > AppDir/slopfinity.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Slopfinity
          GenericName=AI Slop Dashboard
          Comment=Local dashboard for the AMD Strix Halo image+video toolbox
          Exec=slopfinity-server
          Icon=slopfinity
          Categories=Network;Audio;Video;
          Terminal=false
          EOF

          # Icon — reuse the PWA icon. AppImage looks for either an .svg
          # or a .png next to AppRun with the name matching Icon=.
          cp slopfinity/static/icons/icon-256.png AppDir/slopfinity.png

      - name: Download appimagetool
        run: |
          curl -sSL -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build AppImage
        # --appimage-extract-and-run avoids needing FUSE inside the
        # appimagetool itself; helpful in some CI environments. Output
        # name embeds the tag/SHA so multiple build artifacts don't
        # collide on the release page.
        run: |
          VERSION="${GITHUB_REF_NAME:-dev-${GITHUB_SHA::7}}"
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            AppDir "Slopfinity-${VERSION}-x86_64.AppImage"
          ls -lh Slopfinity-*.AppImage

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: slopfinity-appimage
          path: Slopfinity-*.AppImage
          retention-days: 30

      - name: Publish to release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Slopfinity-*.AppImage
          generate_release_notes: true
