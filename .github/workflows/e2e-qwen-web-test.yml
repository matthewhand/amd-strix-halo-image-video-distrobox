name: E2E Qwen Image Web Test

on:
  push:
    branches: [ main, 'e2e-testing' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # =====================================================================
  # DO NOT change runs-on to ubuntu-latest — this job builds a 30 GB ROCm
  # image and burns CI minutes the user does not have. Self-hosted only.
  #
  # The user is on GitHub free tier. Even a manual workflow_dispatch on a
  # hosted runner consumes minutes from a tight monthly budget AND will
  # fail (no AMD GPU, no ROCm, disk/time limits). We pin runs-on to a
  # self-hosted label that does not yet exist, so the job queues
  # indefinitely on hosted CI and only ever picks up on a future
  # self-hosted GPU runner registered with these labels.
  #
  # The if-gate is also kept so the job does not even attempt to schedule
  # on push/pull_request — only manual dispatch can enqueue it.
  # =====================================================================
  e2e-qwen-web:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, amd-gpu]
    timeout-minutes: 30  # Increased timeout for ROCm builds

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        # ubuntu-24.04 runners ship Docker + compose-v2 pre-installed; skip apt.
        # Verify they exist, then install only the Python deps we need.
        docker --version
        docker compose version
        python -m pip install requests

    - name: Ensure Docker socket accessible
      run: |
        # Docker service is already running on ubuntu-24.04 runners; just
        # make sure the non-root user can reach the socket.
        sudo chmod 666 /var/run/docker.sock || true

    - name: Build Docker image
      run: |
        docker build -t amd-strix-halo-image-video-toolbox:test .

    - name: Create test environment
      run: |
        mkdir -p ~/.qwen-image-studio
        chmod -R 755 ~/.qwen-image-studio

    - name: Run E2E Test
      run: |
        python tests/e2e_qwen_web_test.py

    - name: Upload test artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-logs
        path: |
          ~/.qwen-image-studio/*.png
          *.log
        retention-days: 7

  # Lightweight job for push + PR: validates syntax and runs the E2E flow
  # against a stdlib mock worker (no Docker, no GPU). This is what gates CI.
  e2e-qwen-web-light:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install requests pytest

    - name: Run syntax validation
      run: |
        python -m py_compile tests/e2e_qwen_web_test.py tests/mock_qwen_server.py
        python -c "import tests.e2e_qwen_web_test; print('Test script syntax valid')"

    - name: Create test output dir
      run: |
        mkdir -p ~/.qwen-image-studio
        chmod -R 755 ~/.qwen-image-studio

    - name: Run E2E test against mock worker
      env:
        MOCK_QWEN_WEB: "1"
      run: |
        python tests/e2e_qwen_web_test.py
