name: CI Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Build validation only
  build-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        push: false
        tags: amd-strix-halo-image-video-toolbox:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

    - name: Test basic container functionality
      run: |
        docker run --rm amd-strix-halo-image-video-toolbox:test \
          python3 -c "import torch; print('✅ Container builds and PyTorch works')"

  # Code validation
  code-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install requests pytest

    - name: Validate E2E test script
      run: |
        python -m py_compile tests/e2e_qwen_web_test.py
        python -c "import tests.e2e_qwen_web_test; print('✅ E2E test syntax valid')"

    - name: Validate Docker Compose
      run: |
        python3 -c "import yaml; yaml.safe_load(open('docker-compose.yaml'))" && echo "✅ Docker Compose valid"